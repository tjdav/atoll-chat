<template id="coralite-chat-list">
  <div class="d-flex flex-column h-100 bg-body-tertiary">
    <div class="p-3 border-bottom border-secondary d-flex justify-content-between align-items-center">
      <h5 class="m-0 fw-bold">Chats</h5>
      <button class="btn btn-sm btn-outline-secondary rounded-circle" data-bs-toggle="modal" data-bs-target="#newRoomModal" aria-label="New Room">
        <i class="bi bi-pencil-square"></i>
      </button>
      <button class="d-none" data-bs-toggle="modal" data-bs-target="#newRoomModal">New Room</button>
    </div>

    <div class="px-3 py-2">
      <div class="input-group">
        <span class="input-group-text bg-body-secondary border-0 rounded-start-pill text-muted" id="search-addon"><i class="bi bi-search"></i></span>
        <input type="text" class="form-control bg-body-secondary border-0 rounded-end-pill" placeholder="Search messages" aria-label="Search messages" aria-describedby="search-addon">
      </div>
    </div>

    <div class="list-group list-group-flush overflow-auto flex-grow-1" ref="roomList">
      <!-- Rooms dynamically generated here -->
    </div>

    <!-- New Room Modal -->
    <div class="modal fade" id="newRoomModal" tabindex="-1" aria-labelledby="newRoomModalLabel" aria-hidden="true" ref="newRoomModal">
      <div class="modal-dialog">
        <div class="modal-content text-bg-dark">
          <div class="modal-header border-secondary">
            <h1 class="modal-title fs-5" id="newRoomModalLabel">Create New Room</h1>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <div class="mb-3">
              <label for="roomNameInput" class="form-label">Room Name</label>
              <input type="text" class="form-control bg-dark text-white border-secondary" id="roomNameInput" ref="roomNameInput">
            </div>
          </div>
          <div class="modal-footer border-secondary">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            <button type="button" class="btn btn-primary" ref="createRoomBtn">Create</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</template>

<script type="module" client>
  import { defineComponent } from 'coralite'

  export default defineComponent({
    client: {
      script: ({ helpers }) => {
        const { refs, getRooms, createEncryptedRoom, emit, on, events } = helpers
        const roomList = refs('roomList')
        const newRoomModal = refs('newRoomModal')
        const roomNameInput = refs('roomNameInput')
        const createRoomBtn = refs('createRoomBtn')

        const createAvatarHTML = (roomName, avatarUrl) => {
          if (avatarUrl) {
            return '<img src="' + avatarUrl + '" alt="' + roomName + '" class="rounded-circle me-3" style="width: 48px; height: 48px; object-fit: cover;">'
          }

          const initials = roomName ? roomName.substring(0, 2).toUpperCase() : '?'
          return '<div class="rounded-circle me-3 bg-secondary text-white d-flex align-items-center justify-content-center fw-bold fs-5" style="width: 48px; height: 48px; flex-shrink: 0;">' + initials + '</div>'
        }

        const renderRooms = async () => {
          const rooms = await getRooms()

          roomList.innerHTML = rooms.map(room => `
            <button class="list-gr  oup-item list-group-item-action d-flex align-items-center py-3 bg-transparent border-bottom border-secondary-subtle room-item" data-room-id="${room.id}">
              ${createAvatarHTML(room.name, room.avatarUrl)}
              <div class="flex-grow-1 overflow-hidden">
                <div class="d-flex justify-content-between align-items-center mb-1">
                  <h6 class="mb-0 text-truncate fw-semibold">${room.name}</h6>
                  ${room.unreadCount > 0 ? '<span class="badge rounded-pill text-bg-danger ms-2">' + room.unreadCount + '</span>' : ''}
                </div>
                <p class="mb-0 text-muted small text-truncate">${room.lastMessage || 'No recent messages'}</p>
              </div>
            </button>
          `).join('')

          const items = roomList.querySelectorAll('.room-item')
          items.forEach(item => {
            item.addEventListener('click', () => {
              // Remove active class from all
              items.forEach(i => i.classList.remove('active', 'bg-body-secondary'))
              // Add active class to clicked
              item.classList.add('active', 'bg-body-secondary')

              emit(events('chat:room-selected'), { roomId: item.dataset.roomId })
            })
          })
        }

        createRoomBtn.addEventListener('click', async () => {
          const roomName = roomNameInput.value.trim()
          if (!roomName) return

          try {
            await createEncryptedRoom(roomName)
            roomNameInput.value = ''
            // Hide the modal using Bootstrap's modal instance if available,
            // otherwise just hide it manually (or relying on renderRooms to refresh).
            const modalElement = newRoomModal
            const bootstrapModal = bootstrap.Modal.getInstance(modalElement)
            if (bootstrapModal) bootstrapModal.hide()

            // Re-render rooms list
            await renderRooms()
          } catch (error) {
            console.error('Failed to create room:', error)
          }
        })

        on(events('app:logged-in'), () => {
          renderRooms()
        })
        
        on(events('chat:rooms-updated'), () => {
          renderRooms()
        })
      }
    }
  })
</script>
