<template id="coralite-message-bubble">
  <div class="d-flex mb-3" ref="wrapper">
    <div class="message-bubble p-3 rounded-4 shadow-sm" ref="bubble" style="max-width: 75%;">
      <p class="mb-1" ref="body"><slot></slot></p>
      <div class="small" ref="timeDisplay" style="font-size: 0.75rem;">
      </div>
    </div>
  </div>
</template>

<script type="module" client>
  import { defineComponent } from 'coralite'

  export default defineComponent({
    client: {
      script: ({ root, helpers, context }) => {
        const wrapper = helpers.refs('wrapper')
        const bubble = helpers.refs('bubble')
        const timeDisplay = helpers.refs('timeDisplay')
        const body = helpers.refs('body')
        
        const isCurrentUser = context.value['current-user'] === 'true'
        const time = context.value.time || ''

        if (isCurrentUser) {
          wrapper.classList.add('justify-content-end')
          bubble.classList.add('bg-primary', 'text-white')
          timeDisplay.classList.add('text-white-50', 'text-end')
        } else {
          wrapper.classList.add('justify-content-start')
          bubble.classList.add('bg-body-secondary', 'text-body')
          timeDisplay.classList.add('text-muted')
        }

        timeDisplay.textContent = time
      }
    }
  })
</script>
