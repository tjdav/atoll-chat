<template id="atoll-audio-player">
  <div class="position-absolute bottom-0 w-100 bg-dark text-white border-top border-secondary p-2 d-transition-none align-items-center" ref="playerContainer" style="z-index: 1050; height: 80px;">
    
    <atoll-audio-track-info></atoll-audio-track-info>

    <div class="flex-grow-1 d-flex flex-column justify-content-center px-4">
      <atoll-audio-controls></atoll-audio-controls>
      <atoll-audio-timeline></atoll-audio-timeline>
    </div>

    <atoll-audio-volume></atoll-audio-volume>

    <audio class="d-none" ref="audioElement"></audio>

    <atoll-audio-queue-panel></atoll-audio-queue-panel>

  </div>
</template>

<script type="module" client>
import { defineComponent } from 'coralite'
export default defineComponent({
  client: {
    script: ({
      helpers
    }) => {
      const {
        refs: references,
        subscribe,
        setState,
        getLikes,
        toggleLike
      } = helpers
      const playerContainer = references('playerContainer')
      const audioElement = references('audioElement')

      /**
       *  State
       */
      let currentPlaylist = []
      let originalPlaylist = []
      let currentIndex = -1
      let isShuffle = false
      // 'none', 'all', 'one'
      let repeatMode = 'none'
      // Store string IDs of liked tracks
      let likedTracks = new Set()
      let currentObjectUrl = null
      let isMuted = false
      let previousVolume = 1
      let isQueueVisible = false

      /**
       *  Like DB Init
       */
      const loadLikes = async () => {
        try {
          const likesArray = await getLikes()
          likedTracks = new Set(likesArray)
        } catch (event) {
          console.error('Error loading likes from IndexedDB:', event)
        }
      }
      loadLikes()

      /**
       *  Audio Element Listeners
       */
      audioElement.addEventListener('play', () => {
        setState('playerIsPlaying', true)
      })
      audioElement.addEventListener('pause', () => {
        setState('playerIsPlaying', false)
      })
      audioElement.addEventListener('loadedmetadata', () => {
        setState('playerDuration', audioElement.duration)
      })
      audioElement.addEventListener('timeupdate', () => {
        setState('playerCurrentTime', audioElement.currentTime)
      })
      audioElement.addEventListener('ended', () => {
        if (repeatMode === 'one') {
          audioElement.currentTime = 0
          audioElement.play().catch(event => console.error('Error replaying audio:', event))
        } else {
          playNext(false)
        }
      })

      // Initial volume setup
      audioElement.volume = 1
      previousVolume = audioElement.volume
      setState('playerVolumeState', {
        volume: audioElement.volume,
        isMuted: audioElement.muted
      })

      /**
       *  Playback Internal
       */
      const playTrack = file => {
        if (currentObjectUrl) {
          URL.revokeObjectURL(currentObjectUrl)
        }
        currentObjectUrl = URL.createObjectURL(file.blob)
        audioElement.src = currentObjectUrl
        playerContainer.classList.remove('d-transition-none')
        playerContainer.classList.add('d-transition-show')
        playerContainer.classList.add('d-flex')

        // Emit track updates to track info and queue panel
        setState('playerCurrentTrack', {
          file,
          isLiked: likedTracks.has(file.id)
        })
        setState('playerQueueState', {
          playlist: currentPlaylist,
          index: currentIndex
        })
        audioElement.play().catch(event => console.error('Error playing audio:', event))
      }
      const playNext = (manual = true) => {
        if (currentPlaylist.length === 0) {
          return
        }

        // If not manual, and repeatMode is 'none', and at the end of playlist, stop
        if (!manual && repeatMode === 'none' && currentIndex === currentPlaylist.length - 1) {
          audioElement.pause()
          audioElement.currentTime = 0
          setState('playerIsPlaying', false)
          return
        }
        currentIndex = (currentIndex + 1) % currentPlaylist.length
        const nextFile = currentPlaylist[currentIndex]
        if (nextFile) {
          playTrack(nextFile)
        }
      }
      const playPrevious = () => {
        if (currentPlaylist.length === 0) {
          return
        }
        currentIndex = ((currentIndex - 1) + currentPlaylist.length) % currentPlaylist.length
        const prevFile = currentPlaylist[currentIndex]
        if (prevFile) {
          playTrack(prevFile)
        }
      }

      /**
       *  State Listeners from Child Components
       */
      // Controls
      subscribe('triggerPlayerTogglePlay', (payload) => {
        if (!payload) {
          return
        }
        if (audioElement.paused) {
          audioElement.play().catch(event => console.error('Error playing audio:', event))
        } else {
          audioElement.pause()
        }
      })
      subscribe('triggerPlayerNext', (payload) => {
        if (!payload) {
          return
        }
        playNext(true)
      })
      subscribe('triggerPlayerPrevious', (payload) => {
        if (!payload) {
          return
        }
        playPrevious()
      })
      subscribe('triggerPlayerToggleShuffle', (payload) => {
        if (!payload) {
          return
        }
        isShuffle = !isShuffle
        if (isShuffle) {
          setState('playerIsShuffle', true)
          if (currentPlaylist.length > 0) {
            const currentFile = currentPlaylist[currentIndex]
            const rest = [...originalPlaylist]
            const origIndex = rest.findIndex(f => f.id === currentFile.id)
            if (origIndex !== -1) {
              rest.splice(origIndex, 1)
            }
            for (let i = rest.length - 1; i > 0; i--) {
              const j = Math.floor(Math.random() * (i + 1));
              [rest[i], rest[j]] = [rest[j], rest[i]]
            }
            currentPlaylist = [currentFile, ...rest]
            currentIndex = 0
          }
        } else {
          setState('playerIsShuffle', false)
          if (currentPlaylist.length > 0) {
            const currentFile = currentPlaylist[currentIndex]
            currentPlaylist = [...originalPlaylist]
            currentIndex = currentPlaylist.findIndex(f => f.id === currentFile.id)
          }
        }
        // Update queue when shuffled
        setState('playerQueueState', {
          playlist: currentPlaylist,
          index: currentIndex
        })
      })
      subscribe('triggerPlayerToggleRepeat', (payload) => {
        if (!payload) {
          return
        }
        if (repeatMode === 'none') {
          repeatMode = 'all'
        } else if (repeatMode === 'all') {
          repeatMode = 'one'
        } else {
          repeatMode = 'none'
        }
        setState('playerRepeatMode', repeatMode)
      })

      // Timeline
      subscribe('triggerPlayerSeek', (payload) => {
        if (!payload) {
          return
        }
        audioElement.currentTime = payload.time
      })

      // Volume & Queue Toggles
      subscribe('triggerSetVolume', (payload) => {
        if (!payload) {
          return
        }
        const volume = payload.volume
        if (isMuted && volume > 0) {
          isMuted = false
          audioElement.muted = false
        }
        audioElement.volume = volume
        previousVolume = volume
        setState('playerVolumeState', {
          volume: audioElement.volume,
          isMuted: audioElement.muted
        })
      })
      subscribe('triggerToggleMute', (payload) => {
        if (!payload) {
          return
        }
        if (isMuted) {
          isMuted = false
          audioElement.muted = false
          audioElement.volume = previousVolume
          setState('playerVolumeState', {
            volume: previousVolume,
            isMuted: false
          })
        } else {
          isMuted = true
          audioElement.muted = true
          setState('playerVolumeState', {
            volume: 0,
            isMuted: true
          })
        }
      })
      subscribe('triggerToggleQueue', (payload) => {
        if (!payload) {
          return
        }
        isQueueVisible = !isQueueVisible
        setState('playerIsQueueVisible', isQueueVisible)
      })
      subscribe('triggerCloseQueue', (payload) => {
        if (!payload) {
          return
        }
        isQueueVisible = false
        setState('playerIsQueueVisible', isQueueVisible)
      })

      // Queue panel specific play
      subscribe('triggerPlayQueueTrack', (payload) => {
        if (!payload) {
          return
        }
        currentIndex = payload.index
        playTrack(payload.file)
      })

      // Track Info Like Toggle
      subscribe('triggerToggleLike', async (payload) => {
        if (!payload) {
          return
        }
        const file = payload.file
        if (!file) {
          return
        }

        const fileId = file.id
        try {
          const newLikedState = await toggleLike(fileId)
          if (newLikedState) {
            likedTracks.add(fileId)
          } else {
            likedTracks.delete(fileId)
          }
          setState('playerTrackLikeState', {
            fileId,
            isLiked: newLikedState,
            ts: Date.now()
          })
        } catch (event) {
          console.error('Error updating like in IndexedDB:', event)
        }
      })

      /**
       *  Global Application Event Listeners
       */
      subscribe('triggerAudioPlay', (payload) => {
        if (!payload) {
          return
        }
        const { file, playlist, index } = payload
        let isQueueClick = false
        if (playlist && originalPlaylist.length === playlist.length && originalPlaylist.every((f, i) => f.id === playlist[i].id)) {
          isQueueClick = true
        }
        if (!isQueueClick) {
          if (playlist) {
            originalPlaylist = [...playlist]
            if (isShuffle) {
              const rest = [...originalPlaylist]
              const origIndex = rest.findIndex(f => f.id === file.id)
              if (origIndex !== -1) {
                rest.splice(origIndex, 1)
              } else if (index !== undefined) {
                rest.splice(index, 1)
              }
              for (let i = rest.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [rest[i], rest[j]] = [rest[j], rest[i]]
              }
              currentPlaylist = [file, ...rest]
              currentIndex = 0
            } else {
              currentPlaylist = originalPlaylist
              currentIndex = index !== undefined ? index : currentPlaylist.findIndex(f => f.id === file.id)
            }
          } else {
            originalPlaylist = [file]
            currentPlaylist = [file]
            currentIndex = 0
          }
        } else {
          currentIndex = currentPlaylist.findIndex(f => f.id === file.id)
        }
        playTrack(file)
      })

      // Cleanup
      return () => {
        if (currentObjectUrl) {
          URL.revokeObjectURL(currentObjectUrl)
          currentObjectUrl = null
        }
      }
    }
  }
})
</script>
