<template id="atoll-typing-indicator">
  <div ref="typingIndicatorContainer" class="d-none">
    <!-- Typing indicator rendered here -->
  </div>
</template>

<script type="module" client>
import { defineComponent } from 'coralite'
export default defineComponent({
  client: {
    components: ['atoll-system-message'],
    script: ({ helpers, signal }) => {
      const { refs, subscribe, getCurrentUserId, getRoom } = helpers
      const typingIndicatorContainer = refs('typingIndicatorContainer')

      let currentRoomId = null
      const typingMembers = new Set()

      const updateTypingIndicator = async () => {
        if (typingMembers.size === 0) {
          typingIndicatorContainer.classList.add('d-none')
          typingIndicatorContainer.replaceChildren()
          return
        }

        if (!currentRoomId) {
          return
        }

        const room = await getRoom(currentRoomId)
        if (!room || room.id !== currentRoomId) {
          return
        }

        const memberNames = []
        for (const userId of typingMembers) {
          const member = room.members?.find(m => m.userId === userId)
          memberNames.push(member?.name || userId)
        }

        let text = ''
        if (memberNames.length === 1) {
          text = `${memberNames[0]} is typing...`
        } else if (memberNames.length === 2) {
          text = `${memberNames[0]} and ${memberNames[1]} are typing...`
        } else {
          text = 'Several people are typing...'
        }

        const systemMsg = document.createElement('atoll-system-message')
        systemMsg.appendChild(document.createTextNode(text))

        typingIndicatorContainer.replaceChildren(systemMsg)
        typingIndicatorContainer.classList.remove('d-none')
      }

      subscribe('activeRoomReady', (payload) => {
        if (!payload) {
          return
        }
        const { roomId } = payload
        currentRoomId = roomId
        typingMembers.clear()
        updateTypingIndicator()
      }, { signal })

      subscribe('triggerTypingStateChanged', async (payload) => {
        if (!payload || payload.roomId !== currentRoomId) {
          return
        }

        const currentUserId = await getCurrentUserId()
        if (payload.userId === currentUserId) {
          return
        }

        if (payload.isTyping) {
          typingMembers.add(payload.userId)
        } else {
          typingMembers.delete(payload.userId)
        }

        updateTypingIndicator()
      }, { signal })
    }
  }
})
</script>
