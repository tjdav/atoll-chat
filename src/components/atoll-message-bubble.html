<template id="atoll-message-bubble">
  <div class="d-flex mb-3" ref="wrapper" id="{{ ref_wrapper }}">
    <div class="message-bubble p-3 rounded-4 shadow-sm" ref="bubble" id="{{ ref_bubble }}" style="max-width: 75%;">
      <div class="mb-1" ref="body" id="{{ ref_body }}"><slot></slot></div>
      <div class="small" ref="timeDisplay" id="{{ ref_timeDisplay }}" style="font-size: 0.75rem;">
      </div>
    </div>
  </div>
</template>

<script type="module" client>
  import { defineComponent } from 'coralite'

  export default defineComponent({
    client: {
      script: async ({ helpers, values }) => {
        const { refs, parseMessage } = helpers
        const wrapper = refs('wrapper')
        const bubble = refs('bubble')
        const timeDisplay = refs('timeDisplay')
        const body = refs('body')
        const isCurrentUser = values['current-user'] === 'true'
        const time = values.time || ''

        if (isCurrentUser) {
          wrapper.classList.add('justify-content-end')
          bubble.classList.add('bg-primary', 'text-white')
          timeDisplay.classList.add('text-white-50', 'text-end')
        } else {
          wrapper.classList.add('justify-content-start')
          bubble.classList.add('bg-body-secondary', 'text-body')
          timeDisplay.classList.add('text-muted')
        }

        timeDisplay.textContent = time

        if (parseMessage && body) {
          const slot = body.querySelector('slot')
          
          const processText = () => {
            let text = ''
            if (values.body) {
              text = values.body
            } else if (slot) {
              const nodes = slot.assignedNodes()
              if (nodes.length > 0) {
                text = Array.from(nodes).map(n => n.textContent).join('')
              }
            } else {
              text = body.textContent || ''
            }
            
            if (text && text.trim() !== '') {
              parseMessage(body, text)
            }
          }
          
          if (slot) {
            slot.addEventListener('slotchange', processText)
            // also try immediately in case it's already assigned
            processText()
          } else {
            processText()
          }
        }
      }
    }
  })
</script>
